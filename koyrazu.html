<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | KOYRAZU</title>
    
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tema Kustom (Dark Mode) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            youtube: '#FF0000',
                            discord: '#5865F2',
                            saweria: '#F0A500', // Warna kuning emas untuk donasi
                            tiktok: '#FE2C55', // Warna merah muda TikTok
                            primary: '#8B5CF6' // Ungu utama
                        },
                        dark: {
                            bg: '#0F172A', // Slate 900
                            card: '#1E293B', // Slate 800
                            hover: '#334155' // Slate 700
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Memuat Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Memuat Phosphor Icons untuk ikon-ikon keren -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Efek latar belakang bintang/partikel sederhana */
        body {
            background-color: #0F172A;
            color: #F8FAFC;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Animasi muncul dari bawah untuk tombol */
        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Penundaan agar tombol muncul bergantian */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-center p-4 min-h-screen">

    <!-- Kontainer Utama (Mirip Linktree) -->
    <div class="w-full max-w-md mx-auto pt-8 pb-12">
        
        <!-- Bagian Profil -->
        <div class="flex flex-col items-center mb-8 text-center">
            <!-- Foto Profil dengan cincin warna -->
            <div class="relative mb-4">
                <div class="absolute inset-0 bg-gradient-to-tr from-brand-primary to-blue-500 rounded-full animate-pulse blur-md opacity-70"></div>
                <!-- Ganti placeholder dengan URL foto Anda -->
                <img src="https://i.ibb.co.com/SXGRPYWS/Gemini-Generated-Image-fs83sgfs83sgfs83.png" alt="Foto Profil" class="relative w-28 h-28 rounded-full border-4 border-dark-bg object-cover shadow-2xl">
            </div>
            
            <h1 class="text-2xl font-bold text-white mb-1 flex items-center gap-2">
                KOYRAZU
                <!-- Ikon Verifikasi (Opsional) -->
                <i class="ph-fill ph-check-circle text-brand-primary text-xl"></i>
            </h1>
            <p class="text-slate-400 font-medium text-sm">Gamer & Streamer</p>
        </div>

        <!-- Daftar Tautan Utama -->
        <div class="space-y-4 w-full px-2">
            
            <!-- Link TikTok -->
            <a href="https://www.tiktok.com/@koyrazu" class="slide-up delay-1 group relative flex items-center justify-center w-full p-4 bg-dark-card border border-slate-700/50 rounded-xl hover:bg-brand-tiktok hover:border-brand-tiktok transition-all duration-300 shadow-lg hover:shadow-brand-tiktok/30">
                <div class="absolute left-4">
                    <i class="ph-fill ph-tiktok-logo text-2xl text-slate-300 group-hover:text-white"></i>
                </div>
                <span class="font-semibold text-slate-200 group-hover:text-white tracking-wide">Follow TikTok Saya</span>
            </a>

            <!-- Link Donasi (Saweria/Trakteer) -->
            <a href="https://saweria.co/Koyrazu" class="slide-up delay-2 group relative flex items-center justify-center w-full p-4 bg-dark-card border border-slate-700/50 rounded-xl hover:bg-brand-saweria hover:border-brand-saweria transition-all duration-300 shadow-lg hover:shadow-brand-saweria/30">
                <div class="absolute left-4">
                    <i class="ph-fill ph-coffee text-2xl text-slate-300 group-hover:text-white"></i>
                </div>
                <span class="font-semibold text-slate-200 group-hover:text-white tracking-wide">Dukung via Saweria</span>
            </a>

            <!-- Link Discord -->
            <a href="https://discord.gg/VC7pV2bpn3" class="slide-up delay-3 group relative flex items-center justify-center w-full p-4 bg-dark-card border border-slate-700/50 rounded-xl hover:bg-brand-discord hover:border-brand-discord transition-all duration-300 shadow-lg hover:shadow-brand-discord/30">
                <div class="absolute left-4">
                    <i class="ph-fill ph-discord-logo text-2xl text-slate-300 group-hover:text-white"></i>
                </div>
                <span class="font-semibold text-slate-200 group-hover:text-white tracking-wide">Join Server Discord</span>
            </a>
            
        </div>

    </div>

    <!-- Footer Kecil -->
    <div class="mt-auto pb-4 text-center">
        <p class="text-xs text-slate-500 font-medium tracking-wider">
            Thanks for visiting!
        </p>
    </div>

</body>
</html>
